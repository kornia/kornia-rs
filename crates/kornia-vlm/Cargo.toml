[package]
name = "kornia-vlm"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = "Vision Language Models in Rust"
homepage = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
include = { workspace = true }
publish = false

[dependencies]
candle-core = { workspace = true }
candle-flash-attn = { workspace = true, optional = true }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }
circular-buffer = { workspace = true }
cudarc = { workspace = true, optional = true }
hf-hub = { workspace = true }
kornia-image = { workspace = true }
kornia-imgproc = { workspace = true }
kornia-io = { workspace = true }
kornia-tensor = { workspace = true }
log = { workspace = true }
minijinja = { workspace = true }
num2words = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokenizers = { workspace = true }

[dev-dependencies]
env_logger = { workspace = true }
rand = { workspace = true }

[features]
default = []
cuda = [
  "candle-core/cuda",
  "candle-nn/cuda",
  "candle-transformers/cuda",
  "dep:candle-flash-attn",
  "dep:cudarc",
]
flash-attn = ["candle-transformers/flash-attn"]
metal = ["candle-core/metal"]
