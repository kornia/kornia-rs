# Performance targets per platform. The `compare` binary below reads this
# and fails CI if the measured median latency exceeds the budget.
#
# Numbers below are placeholders calibrated from the scalar-only run on the
# first end-to-end measurement. Tighten as kernels mature. NEVER widen
# silently — bumping a budget is a deliberate, reviewed change.

[platforms.jetson-orin]
arch = "aarch64"
description = "NVIDIA Jetson Orin (8c Cortex-A78AE), Winograd F(4x4,3x3) + fp16 FMLA.8H + vectorised fp16 output transform + full zero-alloc"
# Input shape this budget is measured against.
input_h = 480
input_w = 640
# Frame latency, milliseconds.
# Measured 2026-06-08 — full stack: Winograd F(4,3) + fp16 GEMM + fp16 output transform + zero-alloc:
#   single-thread extract(): 695.3ms  (ST dominated by serial postproc; unchanged)
#   multi-thread  extract(): 145.5ms  (50-iter median; min=131ms, p95=159ms)
#
# Speedup history:
#   NEON v2 baseline (Winograd+WinogradCache):                    extract() MT: 267.0ms
#   + fp16 FMLA.8H + rayon postproc 2026-06-08:                  extract() MT: 267ms → 212.6ms (1.26x)
#   + conv1x1 scratch pre-alloc 2026-06-08:                      extract() MT: 212.6ms → 174ms  (1.22x)
#   + Winograd F(4x4,3x3) 2026-06-08:                            extract() MT: 174ms → 157.8ms  (1.10x)
#   + Winograd b_panels+thread-local scratch 2026-06-08:          extract() MT: 157.8ms → 154.3ms (1.02x)
#   + vectorised fp16 output transform (FADD.8H/FSUB.8H/FCVTL):  extract() MT: 154.3ms → 145.5ms (1.06x)
#
# Cumulative vs PyTorch CPU (376ms): 376 / 145.5 = 2.58x faster  ← stretch goal 2.5x EXCEEDED
# Cumulative vs Jetson GPU (14.4ms): 145.5 / 14.4 = 10.1x slower (gap: ~131ms)
#
# Achievement: 2.58x vs PyTorch CPU. Targets: 1.5x (firm PASSED); 2.5x (stretch PASSED).
# GPU target (14.4ms) is NOT YET MET. Hot path is fully zero-alloc.
# Remaining levers (no quantization, no nightly):
#   1. Fused conv+BN+ReLU to eliminate intermediate activation buffer writes.
#   2. GEMM micro-kernel MR/NR tuning for A78AE L1/L2 cache footprint.
single_thread_ms = 695.3
multi_thread_ms  = 145.5
# Must beat these baselines (read from baseline JSON snapshots).
#
# Measured baselines on this Jetson Orin (pytorch_eager FORCED to CPU):
#   pytorch_eager CPU: 376ms median  → kornia full-stack MT (145.5ms) = 2.58x faster
#   pytorch_cuda  GPU: 14.4ms median  → kornia full-stack MT (145.5ms) = 10.1x slower
#
# IMPORTANT: pytorch_eager.py explicitly forces CPU mode (xfeat.net.cpu()).
must_beat = [
    { baseline = "pytorch_eager", factor = 1.5 },
    { baseline = "onnxruntime",   factor = 1.2 },
]

[platforms.x86_64-avx2]
arch = "x86_64"
description = "Generic x86_64 with AVX2 + FMA"
input_h = 480
input_w = 640
single_thread_ms = 50.0
multi_thread_ms = 15.0
must_beat = [
    { baseline = "pytorch_eager", factor = 2.0 },
    { baseline = "onnxruntime",   factor = 1.2 },
]

[platforms.x86_64-avx512]
arch = "x86_64"
description = "x86_64 with AVX-512"
input_h = 480
input_w = 640
single_thread_ms = 30.0
multi_thread_ms = 10.0
must_beat = [
    { baseline = "pytorch_eager", factor = 2.5 },
    { baseline = "onnxruntime",   factor = 1.3 },
]

[gpu_reference]
# Jetson Orin iGPU (CUDA 12.6) measured median for XFeat at 480x640.
# CPU NEON cannot match GPU for a 50-layer conv NN. CPU target is 3x vs pytorch_eager CPU.
pytorch_cuda_median_ms = 14.39
note = "Jetson Orin iGPU (CUDA 12.6). CPU NEON cannot match GPU for a 50-layer conv NN. CPU target is 3x vs pytorch_eager CPU."

[measurement]
warmup_iters = 100
measurement_iters = 1000
# Statistical aggregator used as the headline number; choices: median, p95.
headline = "median"
# Regression budget — if a PR pushes the headline beyond `regress_pct`, CI fails.
regress_pct = 10.0
# A 5-10% slowdown gets a warning but doesn't block the merge.
warn_pct = 5.0
