[package]
name = "kornia-tensor"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = "Lightweight tensor library in Rust for computer vision"
homepage = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
publish = true

[[bench]]
harness = false
name = "bench_view"

[dependencies]
bincode = { workspace = true, optional = true }
cubecl-core = { version = "=0.10.0-pre.4", default-features = false, features = ["std"], optional = true }
cubecl-cuda = { version = "=0.10.0-pre.4", optional = true }
cudarc = { version = "0.19.0", features = ["driver", "cuda-version-from-build-system", "fallback-dynamic-loading", "fallback-latest"], default-features = false, optional = true }
num-traits = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true, optional = true }
thiserror = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
serde_json = { workspace = true }

[features]
bincode = ["dep:bincode"]
gpu = []
gpu-cubecl = ["dep:cubecl-core", "dep:cubecl-cuda", "dep:cudarc", "gpu"]
serde = ["dep:serde"]
