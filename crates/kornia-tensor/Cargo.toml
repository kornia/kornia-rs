[package]
name = "kornia-tensor"
version = { workspace = true }
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
description = "Lightweight tensor library in Rust for computer vision"
homepage = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
publish = true

[[bench]]
harness = false
name = "bench_view"

[dependencies]
bincode = { workspace = true, optional = true }
dlpack-rs = { version = "0.3.3", default-features = false, optional = true }
num-traits = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true, optional = true }
thiserror = { workspace = true }

[dependencies.cudarc]
version = "0.19.0"
default-features = false
features = [
  "cuda-version-from-build-system",
  "driver",
  "fallback-dynamic-loading",
  "fallback-latest",
  "nvrtc",
  "std"
]
optional = true

[dev-dependencies]
criterion = { workspace = true }
serde_json = { workspace = true }

[features]
bincode = ["dep:bincode"]
# cudarc device-memory integration — default OFF.
# Enables CudaResource / CudaAllocator and Tensor::to_cuda / to_host etc.
# Verify absence: `cargo tree -p kornia-tensor -e features | grep -i cudarc`
cudarc = ["dep:cudarc"]
dlpack = ["dep:dlpack-rs"]
serde = ["dep:serde"]
