name: Rust Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust_test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust_test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        mode: [default, all-features, no-default-features]
        release: [true, false]
        include:
          - mode: default
            flags: ""
          - mode: all-features
            flags: "--all-features"
          - mode: no-default-features
            flags: "--no-default-features"
          - release: true
            rel_flag: "--release"
          - release: false
            rel_flag: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.40.0
          cache: true
          environments: dev

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - name: Run tests (${{ matrix.mode }}, release=${{ matrix.release }})
        run: |
            pixi run cargo hack test --workspace ${{ matrix.flags }} ${{ matrix.rel_flag }}

      - name: Show sccache stats
        if: always()
        run: |
            sccache --show-stats 2>&1 || echo "::warning::sccache stats unavailable - server may have exited"