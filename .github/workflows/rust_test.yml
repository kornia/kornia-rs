name: Rust Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust_test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "crates/**"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust_test.yml"

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default feature tests
          - name: Test Debug (default) - x86_64
            runner: ubuntu-latest
            mode: default
            release: false

          - name: Test Release (default) - x86_64
            runner: ubuntu-latest
            mode: default
            release: true

          - name: Test Debug (default) - aarch64
            runner: ubuntu-24.04-arm
            mode: default
            release: false

          # All-features tests
          - name: Test Debug (all-features) - x86_64
            runner: ubuntu-latest
            mode: all-features
            release: false

          # Minimal tests
          - name: Test Debug (no-default-features) - x86_64
            runner: ubuntu-latest
            mode: no-default-features
            release: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.40.0
          cache: true

      - name: Install cargo-hack
        run: pixi run cargo install cargo-hack

      - name: Run tests
        run: |
          if [ "${{ matrix.release }}" = "true" ]; then
            if [ "${{ matrix.mode }}" = "default" ]; then
              pixi run cargo test --workspace --release
            else
              pixi run cargo hack test --workspace --release \
                $([ "${{ matrix.mode }}" = "all-features" ] && echo "--all-features") \
                $([ "${{ matrix.mode }}" = "no-default-features" ] && echo "--no-default-features")
            fi
          else
            if [ "${{ matrix.mode }}" = "default" ]; then
              pixi run cargo test --workspace
            else
              pixi run cargo hack test --workspace \
                $([ "${{ matrix.mode }}" = "all-features" ] && echo "--all-features") \
                $([ "${{ matrix.mode }}" = "no-default-features" ] && echo "--no-default-features")
            fi
          fi

      - name: Show sccache stats
        if: always()
        run: |
          sccache --show-stats 2>&1 || echo "::warning::sccache stats unavailable - server may have exited"