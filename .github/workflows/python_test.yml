name: Python Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "kornia-py/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kornia-py/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.8"
            pixi-env: py38
          - python-version: "3.9"
            pixi-env: py39
          - python-version: "3.10"
            pixi-env: py310
          - python-version: "3.11"
            pixi-env: py311
          - python-version: "3.12"
            pixi-env: py312
          - python-version: "3.13"
            pixi-env: py313
          - python-version: "3.14"
            pixi-env: py314
          - python-version: "3.14t"
            pixi-env: py314t
            threaded: true

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.40.0
          cache: true
          environments: ${{ matrix.pixi-env }}

      - name: Run tests
        if: ${{ !matrix.threaded }}
        run: pixi run -e ${{ matrix.pixi-env }} py-test

      - name: Run multithreaded tests
        if: ${{ matrix.threaded }}
        run: pixi run -e ${{ matrix.pixi-env }} py-test-threaded

      - name: Show sccache stats
        if: always()
        run: |
          sccache --show-stats 2>&1 || echo "::warning::sccache stats unavailable - server may have exited"

  # PR-time release dry-run: cross-build manylinux wheels with the same
  # rustflag-stripping the release workflow uses, verify SIMD instructions
  # are actually present in the built `.so`, and upload as a downloadable
  # artifact. Lets us spot a broken SIMD path *before* hitting "Run workflow"
  # on python_release.yml. One Python version is enough — SIMD codegen is
  # version-independent.
  wheels:
    name: wheel-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    # Match the release workflow: drop the local `.cargo/config.toml`
    # baselines so wheels target stock CPUs and SIMD paths are gated only
    # by per-fn `#[target_feature]` + runtime `cpu_features()` selection.
    # Override the x86_64 linker too: `.cargo/config.toml` pins it to
    # `x86_64-linux-gnu-gcc` (the Debian-named cross compiler used for
    # Jetson-hosted x86_64 cross-test) but the manylinux2014 container
    # is CentOS 7 and only ships plain `cc`/`gcc`.
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ""
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: "cc"
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-Copt-level=2"
    steps:
      - uses: ilammy/setup-nasm@v1
      - uses: actions/checkout@v6
      - uses: messense/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          command: build
          before-script-linux: |
            if command -v dnf &> /dev/null; then dnf install cmake3 -y; elif command -v yum &> /dev/null; then yum install cmake3 -y; elif command -v apt-get &> /dev/null; then apt-get update && apt-get install cmake -y; else echo "None of dnf, yum, or apt found."; fi
            if command -v cmake3 &> /dev/null; then export CMAKE=cmake3; fi
          args: --release --out dist -i python3.10 -m kornia-py/Cargo.toml
      # The verifier runs on the *outer* ubuntu-latest runner (x86_64), so
      # the aarch64 wheel needs the Debian-named cross binutils to read its
      # symbols. The release workflow has the same need but masks it with
      # `2>/dev/null | grep | head` — that pipe always exits 0 even when the
      # tool is missing, so its "no NEON" branch never fires. Our verifier
      # uses `set -euo pipefail` and would actually catch the regression.
      - name: Install cross binutils for aarch64 disassembly
        if: matrix.target == 'aarch64'
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu
      - name: Verify each SIMD kernel was compiled with the expected intrinsics
        run: |
          set -e
          WHEEL=$(ls dist/*-manylinux*.whl 2>/dev/null | head -n1)
          [ -n "$WHEEL" ] || { echo "no manylinux wheel found"; exit 1; }
          bash kornia-py/scripts/verify_simd_kernels.sh "$WHEEL"
      - name: Upload PR wheel
        uses: actions/upload-artifact@v7
        with:
          name: pr-wheel-${{ matrix.target }}-py310
          path: dist
          retention-days: 14
