name: Python Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "kornia-py/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kornia-py/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.8"
            pixi-env: py38
          - python-version: "3.9"
            pixi-env: py39
          - python-version: "3.10"
            pixi-env: py310
          - python-version: "3.11"
            pixi-env: py311
          - python-version: "3.12"
            pixi-env: py312
          - python-version: "3.13"
            pixi-env: py313
          - python-version: "3.14"
            pixi-env: py314

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.40.0
          cache: true
          environments: ${{ matrix.pixi-env }}

      - name: Run tests
        run: pixi run -e ${{ matrix.pixi-env }} py-test

      - name: Show sccache stats
        if: always()
        run: |
          sccache --show-stats 2>&1 || echo "::warning::sccache stats unavailable - server may have exited"

  # Python 3.14t (free-threaded) needs a standalone job because pixi's
  # conda-forge rust package sets environment variables that cause maturin
  # to falsely detect cross-compilation and reject the uv-provided interpreter.
  test-free-threaded:
    name: py3.14t-linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache

      - uses: astral-sh/setup-uv@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake nasm libunwind-dev

      - name: Setup Python 3.14t environment
        run: |
          uv venv -p 3.14t .venv
          source .venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          echo "PYTHON_GIL=0" >> $GITHUB_ENV

      - name: Verify free-threaded interpreter
        run: |
          python --version --version
          python -c "import sys; print('GIL enabled:', sys._is_gil_enabled())"
          python -c "import sysconfig; print('Py_GIL_DISABLED:', sysconfig.get_config_var('Py_GIL_DISABLED'))"

      - name: Install maturin and test deps
        run: uv pip install maturin pytest pytest-parallel-threads numpy

      - name: Build and test
        run: |
          cd kornia-py
          maturin develop -m Cargo.toml
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL was re-enabled after import!'"
          python -m pytest --parallel-threads=8 --iterations=50

      - name: Show sccache stats
        if: always()
        run: |
          sccache --show-stats 2>&1 || echo "::warning::sccache stats unavailable - server may have exited"
