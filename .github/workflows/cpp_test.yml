name: C++ Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "kornia-cpp/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cpp_test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kornia-cpp/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cpp_test.yml"

jobs:
  test:
    name: C++ Test - ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - build_type: Debug
            command: cpp-test
          - build_type: Release
            command: cpp-test-release

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-cache
        with:
          cache-prefix: cpp
          extra-cache-paths: kornia-cpp/target/
          with-sccache: "false"

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          cache: true

      - name: Build and run C++ tests
        # On macOS the pixi/conda cxx-compiler has no SDKROOT, so its clang can't
        # find the macOS SDK / libSystem and the link fails on basic libc symbols
        # (_strlen/_snprintf/_sigaction). Point it at the Xcode SDK. (xcrun only
        # exists on macOS; guard so the ubuntu matrix leg is unaffected.)
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export SDKROOT="$(xcrun --show-sdk-path)"
            export CONDA_BUILD_SYSROOT="$SDKROOT"
          fi
          pixi run ${{ matrix.command }}

  lint:
    name: C++ Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          cache: true

      - name: Check formatting
        run: pixi run cpp-fmt-check
