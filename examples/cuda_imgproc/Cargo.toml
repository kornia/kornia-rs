[package]
name = "cuda-imgproc"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
cudarc = { version = "0.19", default-features = false, features = [
  "cuda-version-from-build-system",
  "driver",
  "fallback-dynamic-loading",
  "fallback-latest",
  "nvrtc",
  "std",
] }
kornia-image = { path = "../../crates/kornia-image", features = ["cuda"] }
kornia-io = { path = "../../crates/kornia-io" }
kornia-tensor = { path = "../../crates/kornia-tensor", features = ["cuda"] }
