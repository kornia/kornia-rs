[package]
name = "cuda-camera-preprocess"
version = "0.1.0"
authors = ["Edgar Riba <edgar.riba@gmail.com>"]
license = "Apache-2.0"
edition = "2021"
publish = false

[dependencies]
argh = { workspace = true }
cudarc = { version = "0.19", default-features = false, features = [
  "cuda-version-from-build-system",
  "driver",
  "fallback-dynamic-loading",
  "fallback-latest",
  "nvrtc",
  "std",
] }
kornia-image = { path = "../../crates/kornia-image", features = ["cuda"] }
kornia-imgproc = { path = "../../crates/kornia-imgproc", features = ["cuda"] }
kornia-io = { path = "../../crates/kornia-io", features = ["v4l"] }
kornia-tensor = { path = "../../crates/kornia-tensor", features = ["cuda"] }
